<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ServicePulse · Performance Dashboard</title>
  <link rel="stylesheet" href="./css/app.css?v=5" />
</head>
<body>
  <div class="wrap">
    <div class="top" style="display:none">
      <div>
        <div class="titleRow">
          <label for="menuToggle" class="hamburger" aria-label="Open menu" title="Menu">☰</label>
          <h1>Technician Performance Dashboard</h1>
        </div>
        <div class="sub">Generated: <b>2026-01-27</b></div>
      </div>
    </div>

    <!-- Checkbox-driven menu -->
    <input type="checkbox" id="menuToggle" class="menuToggle">

    <div id="sideMenu" class="sideMenu" aria-hidden="true">
      <div class="menuHdr">
        <div class="menuTitle" style="display:flex;align-items:center;gap:10px;">
          <svg viewBox="0 0 60 24" width="60" height="24" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
            <polyline
              points="0,14 9,14 13,14 16,4 19,22 22,10 25,14 34,14 38,14 41,4 44,22 47,10 50,14 60,14"
              fill="none" stroke="#ef4444" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"
              style="filter:drop-shadow(0 0 4px #ef4444aa)"/>
          </svg>
          <span style="font-size:18px;font-weight:900;color:#fff;letter-spacing:0.3px;">Service<span style="margin-left:5px;color:#ef4444;">Pulse</span></span>
        </div>
        <label for="menuToggle" class="menuClose" aria-label="Close menu" title="Close">✕</label>
      </div>

      <!-- Services Dashboard (TOP) -->
      <a class="menuLink topLink" href="#/servicesHome" style="font-weight:800;">
        <span class="mIcon asrIcon" aria-hidden="true" style="font-weight:800;">
          <svg viewBox="0 0 24 24" width="16" height="16" class="asrSvg">
            <path d="M12 3 L22 21 H2 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path>
            <line x1="12" y1="9" x2="12" y2="14" stroke="#ffffff" stroke-width="2" stroke-linecap="round"></line>
            <circle cx="12" cy="17" r="1.2" fill="#ffffff"></circle>
          </svg>
        </span>
        Services Dashboard
      </a>

      <!-- Technician Dashboard -->
      <a class="menuLink topLink" href="#/" style="font-weight:800;">
        <span class="mIcon" aria-hidden="true" style="font-weight:800;">🔧</span>
        Technician Dashboard
      </a>

      <!-- Advisor Dashboard -->
      <a class="menuLink topLink" href="#/advisors" style="font-weight:800;">
        <span class="mIcon" aria-hidden="true" style="font-weight:800;">👤</span>
        Advisor Dashboard
      </a>

      <!-- Express Techs -->
      <details class="menuGroup menuSubTop" open>
        <summary class="menuSubHdr">Express Techs</summary>
        <div id="menuTechListExpress" class="menuTechList"></div>
      </details>

      <!-- Kia Techs -->
      <details class="menuGroup menuSubTop">
        <summary class="menuSubHdr">Kia Techs</summary>
        <div id="menuTechListKia" class="menuTechList"></div>
      </details>

      <!-- Settings -->
      <details class="menuGroup">
        <summary style="font-weight:800;">
          <span class="mIcon" aria-hidden="true" style="font-weight:800;">⚙️</span>
          Settings
        </summary>
        <a class="menuLink" href="#/settings/goals">Goals Settings</a>
        <a class="menuLink" href="#/settings/services">Service Settings</a>
        <a class="menuLink" href="#/settings/dealer">Dealer Settings</a>
      </details>

      <!-- Sign Out -->
      <div style="margin-top:10px;padding:0 10px">
        <button id="signOutBtn" class="menuLink" style="
          width:100%;text-align:left;background:none;
          border:1px solid rgba(248,113,113,.25);color:#fca5a5;
          border-radius:12px;padding:10px 14px;cursor:pointer;
          font-family:inherit;font-size:14px;font-weight:800;
        ">
          <span class="mIcon" aria-hidden="true">🚪</span> Sign Out
        </button>
      </div>
    </div>

    <label for="menuToggle" id="menuScrim" class="menuScrim" aria-hidden="true"></label>

    <div id="app" style="display:grid;gap:12px;margin-top:12px"></div>

    <!-- Technician search modal -->
    <div id="techSearchModal" class="modal" role="dialog" aria-modal="true" aria-label="Technician search">
      <div class="modalCard">
        <div class="modalHdr">
          <div class="modalTitle">Technician Search</div>
          <button class="iconBtn" onclick="window.closeTechSearch && window.closeTechSearch()" aria-label="Close search" title="Close">✕</button>
        </div>
        <input id="techSearchInput" type="text" placeholder="Type a technician name..." autocomplete="off" />
        <div id="techSearchResults" class="modalList"></div>
      </div>
    </div>

    <div class="footer">ServicePulse</div>
  </div>

  <!-- ✅ Scripts (ORDER MATTERS) -->
  <script src="./js/core/base.js?v=10000"></script>
  <script src="./js/pages/renderLoginPage.js?v=1"></script>
  <script src="./js/pages/renderMain.js?v=5"></script>
  <script src="./js/pages/renderTech.js?v=1000"></script>
  <script src="./js/pages/renderGroupPage.js?v=4"></script>
  <script src="./js/pages/renderGoalsPage.js?v=10010"></script>
  <script src="./js/pages/renderServicesHome.js?v=4"></script>
  <script src="./js/pages/renderServiceSettingsPage.js?v=1"></script>
  <script src="./js/pages/renderAdvisorMain.js?v=8"></script>
  <script src="./js/pages/renderSettingsHome.js?v=10011"></script>
  <script src="./js/pages/renderDealerSettingsPage.js?v=1"></script>

  <!-- Sign-out button wiring (login gate is handled by app.js route()) -->
  <script>
    document.addEventListener("DOMContentLoaded", function(){
      var btn = document.getElementById("signOutBtn");
      if(btn){
        btn.addEventListener("click", function(){
          window.clearSession?.();
          var t = document.getElementById("menuToggle");
          if(t) t.checked = false;
          window.renderLoginPage?.({ redirect: "#/" });
        });
      }
    });
  </script>

  <script type="module" src="./js/app.js?v=5"></script>
</body>
</html>
