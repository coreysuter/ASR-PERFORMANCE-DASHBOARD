<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ServicePulse · Performance Dashboard</title>
  <link rel="stylesheet" href="./css/app.css?v=5" />
  <style>
    .sideMenuLink {
      display:flex;align-items:center;gap:14px;
      margin-top:10px;padding:14px 18px;
      border-radius:14px;border:1px solid rgba(255,255,255,.12);
      text-decoration:none;color:#eaf0ff;
      background:rgba(0,0,0,.22);font-weight:800;font-size:17px;
    }
    .sideMenuLink:hover{background:rgba(0,0,0,.38);}
    .sideMenuIcon{display:flex;align-items:center;justify-content:center;flex-shrink:0;width:52px;height:52px;}
    .sideMenuStacked{display:flex;flex-direction:column;line-height:1.2;font-size:17px;}
    .sideMenuGroup{
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;padding:14px 18px;
      background:rgba(0,0,0,.22);margin-top:10px;
    }
    .sideMenuGroup summary{
      display:flex;align-items:center;gap:14px;
      cursor:pointer;font-weight:800;list-style:none;font-size:17px;color:#eaf0ff;
    }
    .sideMenuGroup summary::-webkit-details-marker{display:none;}
    .sideMenuGroup .sideMenuLink{margin:8px 0 0 0;font-size:15px;padding:10px 14px;}
    /* Keep #app top gap consistent */
    #app{ margin-top:12px; }
    /* Hide brand bar on login screen */
    body.login-active #pageTopBar{ display:none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top" style="display:none">
      <div>
        <div class="titleRow">
          <label for="menuToggle" class="hamburger" aria-label="Open menu" title="Menu">☰</label>
          <h1>Technician Performance Dashboard</h1>
        </div>
        <div class="sub">Generated: <b>2026-01-27</b></div>
      </div>
    </div>

    <!-- Checkbox-driven menu -->
    <input type="checkbox" id="menuToggle" class="menuToggle">

    <div id="sideMenu" class="sideMenu" aria-hidden="true">
      <div class="menuHdr">
        <div class="menuTitle" style="display:flex;align-items:center;gap:10px;">
          <svg viewBox="0 0 60 24" width="60" height="24" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
            <polyline points="0,14 9,14 13,14 16,4 19,22 22,10 25,14 34,14 38,14 41,4 44,22 47,10 50,14 60,14"
              fill="none" stroke="#ef4444" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
              style="filter:drop-shadow(0 0 4px #ef4444aa)"/>
          </svg>
          <span style="font-size:18px;font-weight:900;color:#fff;letter-spacing:0.3px;">Service<span style="margin-left:5px;color:#ef4444;">Pulse</span></span>
        </div>
        <label for="menuToggle" class="menuClose" aria-label="Close menu" title="Close">✕</label>
      </div>

      <!-- Date Range Picker -->
      <div id="menuDatePicker" style="padding:8px 14px 10px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:4px;position:relative;">
        <style>
          #drTrigger{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);border-radius:9px;padding:7px 11px;cursor:pointer;transition:all .15s;width:100%;box-sizing:border-box;}
          #drTrigger:hover{background:rgba(255,255,255,0.12);}
          #drTriggerLabel{color:#fff;font-size:13px;font-weight:700;font-family:inherit;flex:1;text-align:left;}
          #drTriggerChevron{color:rgba(255,255,255,0.4);font-size:10px;transition:transform .2s;}
          #drTrigger.open #drTriggerChevron{transform:rotate(180deg);}

          #drDropdown{display:none;flex-direction:column;gap:3px;margin-top:5px;background:rgba(15,20,45,0.97);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:6px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:100;}
          #drDropdown.open{display:flex;}

          .drOpt{background:transparent;border:none;border-radius:7px;color:rgba(255,255,255,0.7);font-size:13px;font-weight:600;font-family:inherit;padding:8px 12px;cursor:pointer;text-align:left;transition:all .12s;width:100%;}
          .drOpt:hover{background:rgba(255,255,255,0.09);color:#fff;}
          .drOpt.active{background:rgba(239,68,68,0.2);color:#fff;}
          .drOpt.active::before{content:'✓ ';color:#ef4444;}

          #drCustomFields{display:none;flex-direction:column;gap:5px;padding:6px 4px 2px;}
          #drCustomFields.open{display:flex;}
          .drCusRow{display:flex;align-items:center;gap:6px;}
          .drCusLbl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.5px;width:28px;flex-shrink:0;}
          .drCusInput{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:7px;color:#fff;font-size:12px;font-weight:600;font-family:inherit;padding:6px 8px;outline:none;color-scheme:dark;transition:border-color .15s;}
          .drCusInput:focus{border-color:rgba(239,68,68,0.6);}
          #drCustomApply{background:rgba(239,68,68,0.75);border:none;border-radius:7px;color:#fff;font-size:12px;font-weight:800;font-family:inherit;padding:7px;cursor:pointer;width:100%;margin-top:2px;transition:background .15s;}
          #drCustomApply:hover{background:rgba(239,68,68,0.95);}
          .drDivider{height:1px;background:rgba(255,255,255,0.08);margin:3px 0;}
        </style>

        <!-- Trigger button -->
        <button id="drTrigger" onclick="window.toggleDrDropdown()">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
            <rect x="2" y="3" width="16" height="15" rx="2.5"/>
            <line x1="2" y1="8" x2="18" y2="8"/>
            <line x1="6" y1="1.5" x2="6" y2="4.5"/>
            <line x1="14" y1="1.5" x2="14" y2="4.5"/>
          </svg>
          <span id="drTriggerLabel">Last 30 Days</span>
          <span id="drTriggerChevron">▼</span>
        </button>

        <!-- Dropdown -->
        <div id="drDropdown">
          <button class="drOpt active" data-preset="30" onclick="window.applyDatePreset('30')">Last 30 Days</button>
          <button class="drOpt" data-preset="60" onclick="window.applyDatePreset('60')">Last 60 Days</button>
          <button class="drOpt" data-preset="90" onclick="window.applyDatePreset('90')">Last 90 Days</button>
          <div class="drDivider"></div>
          <button class="drOpt" data-preset="mtd" onclick="window.applyDatePreset('mtd')">Month to date</button>
          <button class="drOpt" data-preset="lm" onclick="window.applyDatePreset('lm')">Last month</button>
          <button class="drOpt" data-preset="ytd" onclick="window.applyDatePreset('ytd')">Year to date</button>
          <div class="drDivider"></div>
          <button class="drOpt" data-preset="custom" onclick="window.toggleDrCustom()">Custom range…</button>
          <div id="drCustomFields">
            <div class="drCusRow"><span class="drCusLbl">From</span><input type="date" id="globalDateStart" class="drCusInput"/></div>
            <div class="drCusRow"><span class="drCusLbl">To</span><input type="date" id="globalDateEnd" class="drCusInput"/></div>
            <button id="drCustomApply" onclick="window.applyCustomRange()">Apply</button>
          </div>
        </div>
      </div>

      <!-- Services Dashboard -->
      <a class="sideMenuLink" href="#/servicesHome">
        <span class="sideMenuIcon">
          <svg viewBox="0 0 40 36" width="36" height="38" xmlns="http://www.w3.org/2000/svg">
            <polygon points="20,1 39,35 1,35" fill="#fcd34d"/>
            <line x1="20" y1="12" x2="20" y2="24" stroke="black" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="20" cy="30" r="2.5" fill="black"/>
          </svg>
        </span>
        <span class="sideMenuStacked"><span>Services</span><span>Dashboard</span></span>
      </a>

  <!-- ✅ Login gate + dealer settings route -->
  <script>
    // NOTE: SESSION_KEY is declared as `const` in renderLoginPage.js — do NOT redeclare it
    // here or the entire script block will throw a SyntaxError and all guards below will
    // silently fail.  Use window.getSession() (defined by renderLoginPage.js) instead.
    function hasSession(){
      try{ return !!(window.getSession && window.getSession()); }
      catch(e){ return false; }
    }

    // Called on hashchange (capture phase) and on window load
    function handleRoute(e){
      var h = location.hash || "#/";

      // Not logged in — show login and block all other handlers
      if(!hasSession()){
        if(e && e.stopImmediatePropagation) e.stopImmediatePropagation();
        window.renderLoginPage && window.renderLoginPage({ redirect: h });
        return;
      }

      // Dealer settings — app.js has no route for this so we handle it
      if(h === "#/settings/dealer" || h.indexOf("#/settings/dealer?") === 0){
        if(e && e.stopImmediatePropagation) e.stopImmediatePropagation();
        window.renderDealerSettingsPage && window.renderDealerSettingsPage();
        return;
      }

      // Everything else: let app.js handle it normally
    }

    // Capture phase fires before app.js bubble-phase listeners
    window.addEventListener("hashchange", handleRoute, true);

    // ALSO block DOMContentLoaded render if not logged in (capture fires before app.js)
    window.addEventListener("DOMContentLoaded", handleRoute, true);

    // window load fires AFTER all scripts (including renderSettingsHome.js's
    // inline safeRouter() call) have fully executed — so we can safely overwrite
    window.addEventListener("load", function(){ handleRoute(null); });

    // Sign out — defined as a global so the button can call it directly via onclick,
    // avoiding any DOMContentLoaded timing dependency.
    window.doSignOut = function(){
      try{ window.clearSession ? window.clearSession() : localStorage.removeItem("dashSession_v1"); }catch(e){}
      window.location.replace(location.pathname);
    };

    // Date range picker
    var _drLabels = {'30':'Last 30 Days','60':'Last 60 Days','90':'Last 90 Days','mtd':'MTD','lm':'Last Month','ytd':'YTD'};

    window.toggleDrDropdown = function() {
      var dd = document.getElementById('drDropdown');
      var btn = document.getElementById('drTrigger');
      var isOpen = dd.classList.contains('open');
      dd.classList.toggle('open', !isOpen);
      btn.classList.toggle('open', !isOpen);
    };

    window.toggleDrCustom = function() {
      var cf = document.getElementById('drCustomFields');
      cf.classList.toggle('open');
      document.querySelectorAll('.drOpt').forEach(function(b){ b.classList.toggle('active', b.dataset.preset==='custom' && cf.classList.contains('open')); });
    };

    window.applyDatePreset = function(preset) {
      var today = new Date();
      var yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
      var start, end = yesterday;
      function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
      if(preset==='30'){ start=new Date(yesterday); start.setDate(start.getDate()-29); }
      else if(preset==='60'){ start=new Date(yesterday); start.setDate(start.getDate()-59); }
      else if(preset==='90'){ start=new Date(yesterday); start.setDate(start.getDate()-89); }
      else if(preset==='mtd'){ start=new Date(today.getFullYear(),today.getMonth(),1); }
      else if(preset==='lm'){ start=new Date(today.getFullYear(),today.getMonth()-1,1); end=new Date(today.getFullYear(),today.getMonth(),0); }
      else if(preset==='ytd'){ start=new Date(today.getFullYear(),0,1); }
      window.globalDateRange = { preset:preset, start:fmt(start), end:fmt(end) };
      window.dispatchEvent(new CustomEvent('globalDateChange', { detail: window.globalDateRange }));
      // Update UI
      document.querySelectorAll('.drOpt').forEach(function(b){ b.classList.toggle('active', b.dataset.preset===preset); });
      var lbl = document.getElementById('drTriggerLabel');
      if(lbl) lbl.textContent = _drLabels[preset] || preset;
      // Close dropdown
      document.getElementById('drDropdown').classList.remove('open');
      document.getElementById('drTrigger').classList.remove('open');
      document.getElementById('drCustomFields').classList.remove('open');
    };

    window.applyCustomRange = function() {
      var s = document.getElementById('globalDateStart').value;
      var e = document.getElementById('globalDateEnd').value;
      if(!s || !e) return;
      window.globalDateRange = { preset:'custom', start:s, end:e };
      window.dispatchEvent(new CustomEvent('globalDateChange', { detail: window.globalDateRange }));
      var lbl = document.getElementById('drTriggerLabel');
      if(lbl) lbl.textContent = s.slice(5)+' – '+e.slice(5);
      document.getElementById('drDropdown').classList.remove('open');
      document.getElementById('drTrigger').classList.remove('open');
    };

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
      var picker = document.getElementById('menuDatePicker');
      if(picker && !picker.contains(e.target)){
        document.getElementById('drDropdown') && document.getElementById('drDropdown').classList.remove('open');
        document.getElementById('drTrigger') && document.getElementById('drTrigger').classList.remove('open');
      }
    });

    window.addEventListener('DOMContentLoaded', function() {
      window.applyDatePreset('30');
    });
</script>

  <script type="module" src="./js/app.js?v=5"></script>
</body>
